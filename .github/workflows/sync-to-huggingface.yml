name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ashishsankhua
          HF_SPACE_NAME: capital_eye_market_agent
        run: |
          # Check if HF_TOKEN is set
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ ERROR: HF_TOKEN secret is not set!"
            echo ""
            echo "To fix this:"
            echo "1. Go to https://huggingface.co/settings/tokens"
            echo "2. Create a new token with 'Write' access"
            echo "3. Go to https://github.com/asankhua/capital-eye-market-agent/settings/secrets/actions"
            echo "4. Add a new secret named 'HF_TOKEN' with your token value"
            echo "5. Re-run this workflow"
            exit 1
          fi
          
          # Install git-lfs
          sudo apt-get update && sudo apt-get install -y git-lfs
          
          # Configure git
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Setup HF repository
          git remote add hf https://$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME 2>/dev/null || true
          
          # Push to Hugging Face
          git push hf main --force

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Successfully synced to Hugging Face Spaces: https://huggingface.co/spaces/${{ env.HF_USERNAME }}/${{ env.HF_SPACE_NAME }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Failed to sync to Hugging Face Spaces"
          echo "Please ensure HF_TOKEN secret is set in GitHub repository settings"
