<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CapitalEye - Intelligent Market Analysis</title>
    <style>
      /* Light mode (default) */
      :root {
        --bg-primary: #f8fafc;
        --bg-secondary: #ffffff;
        --bg-tertiary: #f1f5f9;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --text-tertiary: #94a3b8;
        --border-color: #e2e8f0;
        --accent-color: #2563eb;
        --accent-hover: #1d4ed8;
        --success-color: #10b981;
        --warning-color: #f59e0b;
        --error-color: #ef4444;
        --card-bg: #ffffff;
        --sidebar-bg: #ffffff;
        --header-bg: #ffffff;
      }
      
      /* Dark mode */
      .dark-mode {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-tertiary: #334155;
        --text-primary: #f8fafc;
        --text-secondary: #cbd5e1;
        --text-tertiary: #94a3b8;
        --border-color: #334155;
        --accent-color: #3b82f6;
        --accent-hover: #60a5fa;
        --success-color: #34d399;
        --warning-color: #fbbf24;
        --error-color: #f87171;
        --card-bg: #1e293b;
        --sidebar-bg: #1e293b;
        --header-bg: #1e293b;
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      #root {
        min-height: 100vh;
        background-color: var(--bg-primary);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
